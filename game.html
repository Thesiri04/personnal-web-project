<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    
    <!-- Preconnect to Google Fonts for faster loading | เตรียมการเชื่อมต่อ Google Fonts เพื่อลดเวลาโหลด -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Let's Play a Game!</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="personnal_info.html">Curriculum Vitae</a></li>
                <li><a href="game.html">Play Game</a></li>
            </ul>
        </nav>
    </header>

    <main class="game-page-main">
        <section class="game-container">
            <div class="game-header">
                <h2>🎮 The Snake Game</h2>
                <p>Control the snake to eat food and grow without hitting the walls or yourself!</p>
            </div>
            
            <div class="game-dashboard">
                <div id="game-controls" class="difficulty-controls">
                    <p class="control-label">Select Difficulty:</p>
                    <div class="button-group">
                        <button id="easyBtn" class="game-btn easy">Easy</button>
                        <button id="mediumBtn" class="game-btn medium">Medium</button>
                        <button id="hardBtn" class="game-btn hard">Hard</button>
                    </div>
                </div>
            </div>

            <noscript>
                <p class="noscript-note">This game requires JavaScript. Please enable JavaScript to play.</p>
            </noscript>

            <div class="canvas-wrapper" id="canvasWrapper">
                <button id="fullscreenBtn" class="fullscreen-btn" title="Fullscreen/Close">⛶</button>
                <canvas id="gameCanvas" width="480" height="320"></canvas>
                
                <!-- Game Over Overlay | ชั้นแสดงผลเมื่อเกมจบ -->
                <div id="gameOverOverlay" class="game-over-overlay is-hidden">
                    <h3>GAME OVER</h3>
                    <p>Score: <span id="finalScore">0</span></p>
                    <button id="overlayRestartBtn" class="game-btn restart">Play Again</button>
                </div>

                <!-- Pause Overlay | ชั้นแสดงผลเมื่อพักเกม -->
                <div id="pauseOverlay" class="pause-overlay is-hidden">
                    <h3>PAUSED</h3>
                    <p>The game is currently paused.</p>
                    <div class="pause-actions">
                        <button id="continueBtn" class="game-btn continue">Continue</button>
                        <button id="endGameBtn" class="game-btn end">End Game</button>
                    </div>
                </div>
            </div>

            <div class="action-controls">
                <button id="restartBtn" class="game-btn restart is-hidden">Restart Game</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Sirirungnapa Polsue. All rights reserved.</p>
    </footer>
    <script src="js/game.js"></script>
</body>
</html>
