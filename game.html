<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    
    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Let's Play a Game!</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="personnal_info.html">Curriculum Vitae</a></li>
                <li><a href="game.html">Play Game</a></li>
            </ul>
        </nav>
    </header>

    <main class="game-page-main">
        <section class="game-container">
            <div class="game-header">
                <h2>🎮 Simple Web Game</h2>
                <p>Enjoy this custom interactive game built with JavaScript.</p>
            </div>
            
            <div class="game-dashboard">
                <div id="game-controls" class="difficulty-controls">
                    <p class="control-label">Select Difficulty:</p>
                    <div class="button-group">
                        <button id="easyBtn" class="game-btn easy">Easy</button>
                        <button id="mediumBtn" class="game-btn medium">Medium</button>
                        <button id="hardBtn" class="game-btn hard">Hard</button>
                    </div>
                </div>
            </div>

            <div class="canvas-wrapper" id="canvasWrapper">
                <button id="fullscreenBtn" class="fullscreen-btn" title="Fullscreen/Close">⛶</button>
                <canvas id="gameCanvas" width="480" height="320"></canvas>
                
                <!-- Game Over Overlay -->
                <div id="gameOverOverlay" class="game-over-overlay" style="display: none;">
                    <h3>GAME OVER</h3>
                    <p>Score: <span id="finalScore">0</span></p>
                    <button id="overlayRestartBtn" class="game-btn restart">
                        <span class="icon">🔄</span> Play Again
                    </button>
                </div>
            </div>

            <div class="action-controls">
                <button id="restartBtn" class="game-btn restart" style="display: none;">
                    <span class="icon">🔄</span> Restart Game
                </button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Sirirungnapa Polsue. All rights reserved.</p>
    </footer>
    <script src="js/game.js"></script>
</body>
</html>
